<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오버워치 단톡</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --chat-bg: #bacee0; --user-bubble: #fee500; --bot-bubble: #ffffff; --system-text: #707b85; --header-icon: #333; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Noto Sans KR', sans-serif; background-color: var(--chat-bg); overflow: hidden; }
        #setup-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { text-align: center; width: 90%; max-width: 400px; }
        input[type="password"] { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; text-align: center; font-size: 1rem; }
        .btn-start { width: 100%; padding: 15px; background: #2c3e50; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
        #main-container { display: none; flex-direction: column; width: 100vw; height: 100vh; }
        .chat-header { background: var(--chat-bg); padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-right { display: flex; gap: 15px; }
        .header-title { font-weight: bold; font-size: 1.1rem; }
        .icon { cursor: pointer; color: var(--header-icon); font-size: 24px; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px 10%; display: flex; flex-direction: column; gap: 25px; }
        .message { position: relative; max-width: 80%; padding: 10px 15px; font-size: 1rem; line-height: 1.5; font-family: 'Noto Serif KR', serif; }
        .message.system { align-self: center; background: transparent; color: var(--system-text); font-size: 0.8rem; font-family: 'Noto Sans KR', sans-serif; text-align: center; max-width: 100%; }
        .message.user { align-self: flex-end; background: var(--user-bubble); border-radius: 15px 0 15px 15px; }
        .message.bot { align-self: flex-start; background: var(--bot-bubble); border-radius: 0 15px 15px 15px; margin-top: 15px; }
        .bot-name { position: absolute; top: -20px; left: 5px; font-size: 0.8rem; font-weight: bold; font-family: 'Noto Sans KR', sans-serif; color: #444; }
        #input-area { background: white; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        .input-wrap { flex: 1; background: #f5f5f5; border-radius: 20px; display: flex; align-items: center; padding: 5px 15px; }
        #user-msg { flex: 1; border: none; background: transparent; padding: 8px 0; outline: none; font-size: 1rem; }
        .input-icon { color: #888; cursor: pointer; font-size: 22px; }
        .send-icon { color: #333; cursor: pointer; font-size: 28px; }
    </style>
</head>
<body>

    <div id="setup-modal">
        <div class="modal-content">
            <h2 style="font-family: 'Noto Sans KR';">대기실</h2>
            <input type="password" id="api-key" placeholder="Google Gemini API 키 입력">
            <button class="btn-start" onclick="initChat()">입장하기</button>
        </div>
    </div>

    <div id="main-container">
        <div class="chat-header">
            <div class="header-left">
                <span class="material-icons icon">arrow_back</span>
                <span class="header-title" id="room-name">단톡방</span>
            </div>
            <div class="header-right">
                <span class="material-icons icon">search</span>
                <span class="material-icons icon">menu</span>
            </div>
        </div>
        <div id="chat-window"></div>
        <div id="input-area">
            <span class="material-icons input-icon">add_box</span>
            <div class="input-wrap">
                <input type="text" id="user-msg" onkeypress="if(event.keyCode==13) sendMessage()">
                <span class="material-icons input-icon">sentiment_satisfied_alt</span>
            </div>
            <span class="material-icons send-icon" onclick="sendMessage()">arrow_circle_up</span>
        </div>
    </div>

    <script>
        let chatChars = [];
        const traits = ["분노", "이성", "막말", "공감"];

        function getRandomName() {
            const lNames = ["김", "이", "박", "최", "정", "강", "조", "윤", "장", "임"];
            const fNames = ["지호", "민서", "서준", "하윤", "도윤", "지민", "예준", "채원", "준서", "지우"];
            return lNames[Math.floor(Math.random()*lNames.length)] + fNames[Math.floor(Math.random()*fNames.length)];
        }

        function initChat() {
            const rawKey = document.getElementById('api-key').value;
            const keyInput = rawKey.replace(/[\r\n\s\t]/gm, "");
            if(!keyInput) return alert("키를 입력해 주세요!");

            chatChars = traits.map(t => ({ name: getRandomName(), trait: t }));
            document.getElementById('room-name').innerText = chatChars[0].name + " 외 " + (chatChars.length-1) + "명";
            document.getElementById('setup-modal').style.display = 'none';
            document.getElementById('main-container').style.display = 'flex';
            chatChars.forEach((c, i) => {
                setTimeout(() => addMsg('system', '', `${c.name} 님이 입장했습니다.`), i * 150);
            });
        }

        async function sendMessage() {
            const input = document.getElementById('user-msg');
            const rawKey = document.getElementById('api-key').value;
            const apiKey = rawKey.replace(/[\r\n\s\t]/gm, "");
            const text = input.value.trim();
            if(!text || !apiKey) return;

            addMsg('user', '나', text);
            input.value = '';

            // 가장 표준적인 v1beta 경로와 모델명으로 재수정
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

            const prompt = `오버워치 단톡방 상황이야. 사용자가 "${text}"라고 했어. 아래 4명의 친구가 '반말'로 리액션해줘. 게임 용어를 적절히 섞어줘. 1. ${chatChars[0].name}(분노) 2. ${chatChars[1].name}(이성) 3. ${chatChars[2].name}(막말) 4. ${chatChars[3].name}(공감). 출력 형식: 이름: 대사`;

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await res.json();
                
                if (!res.ok) {
                    console.log("Error Detail:", data);
                    // 404가 뜨면 주소창에 친 모델명이랑 매칭이 안 된다는 뜻
                    throw new Error(data.error ? data.error.message : '모델을 찾을 수 없습니다.');
                }

                const replyText = data.candidates[0].content.parts[0].text;
                replyText.split('\n').forEach((line, i) => {
                    if(line.includes(':')) {
                        const [n, c] = line.split(':');
                        setTimeout(() => addMsg('bot', n.trim(), c.trim()), i * 500);
                    }
                });
            } catch (e) {
                console.error("Final Catch:", e);
                addMsg('system', '', `오류: ${e.message}`);
            }
        }

        function addMsg(type, name, text) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = type === 'bot' ? `<span class="bot-name">${name}</span>${text}` : text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }
    </script>
</body>
</html>
