<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ow</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --chat-bg: #bacee0; --user-bubble: #fee500; --bot-bubble: #ffffff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Noto Sans KR', sans-serif; background-color: var(--chat-bg); overflow: hidden; }
        #setup-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { text-align: center; width: 90%; max-width: 400px; }
        input[type="password"] { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; text-align: center; font-size: 1rem; }
        .btn-start { width: 100%; padding: 15px; background: #2c3e50; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
        #main-container { display: none; flex-direction: column; width: 100vw; height: 100vh; }
        .chat-header { background: var(--chat-bg); padding: 15px; font-weight: bold; border-bottom: 1px solid rgba(0,0,0,0.05); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px 5%; display: flex; flex-direction: column; gap: 20px; }
        .message { position: relative; max-width: 80%; padding: 10px; border-radius: 10px; line-height: 1.4; font-size: 0.95rem; }
        .message.system { align-self: center; background: rgba(0,0,0,0.1); color: white; font-size: 0.75rem; border-radius: 15px; padding: 5px 12px; }
        .message.user { align-self: flex-end; background: var(--user-bubble); border-top-right-radius: 2px; }
        .message.bot { align-self: flex-start; background: var(--bot-bubble); border-top-left-radius: 2px; margin-top: 15px; }
        .bot-name { position: absolute; top: -18px; left: 2px; font-size: 0.75rem; font-weight: bold; color: #444; }
        #input-area { background: white; padding: 10px; display: flex; gap: 10px; }
        #user-msg { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 15px; outline: none; }
        .send-btn { background: #fee500; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="setup-modal">
        <div class="modal-content">
            <h2>ow</h2>
            <p style="font-size: 0.8rem; color: #666; margin-bottom: 20px;">API 키를 입력하고 입장하세요.</p>
            <input type="password" id="api-key" placeholder="Google Gemini API 키 입력">
            <button class="btn-start" onclick="initChat()">입장하기</button>
        </div>
    </div>

    <div id="main-container">
        <div class="chat-header" id="room-name">단톡방</div>
        <div id="chat-window"></div>
        <div id="input-area">
            <input type="text" id="user-msg" onkeypress="if(event.keyCode==13) sendMessage()">
            <button class="send-btn" onclick="sendMessage()">전송</button>
        </div>
    </div>

    <script>
        let chatChars = [];
        function getRandomName() {
            const lNames = ["김","이","박","최","정","강"];
            const fNames = ["지호","민서","서준","하윤","도윤","지민"];
            return lNames[Math.floor(Math.random()*lNames.length)] + fNames[Math.floor(Math.random()*fNames.length)];
        }

        function initChat() {
            const key = document.getElementById('api-key').value.trim();
            if(!key) return alert("키를 입력하세요!");
            chatChars = ["분노", "이성", "막말", "공감"].map(t => ({ name: getRandomName(), trait: t }));
            document.getElementById('room-name').innerText = chatChars[0].name + " 외 3명";
            document.getElementById('setup-modal').style.display = 'none';
            document.getElementById('main-container').style.display = 'flex';
            addMsg('system', '', '오버워치 단톡방에 입장했습니다.');
        }

        async function sendMessage() {
            const input = document.getElementById('user-msg');
            const apiKey = document.getElementById('api-key').value.trim();
            const text = input.value.trim();
            if(!text || !apiKey) return;

            addMsg('user', '나', text);
            input.value = '';

            // [핵심] v1beta와 가장 순수한 모델명 사용
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

            const prompt = `오버워치 단톡방이야. "${text}"라고 말한 것에 대해 각자 성격대로 반말로 리액션해줘. 이름:대사 형식으로.`;

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error?.message || '연결 실패');

                const reply = data.candidates[0].content.parts[0].text;
                reply.split('\n').forEach((line, i) => {
                    if(line.includes(':')) {
                        const [n, c] = line.split(':');
                        setTimeout(() => addMsg('bot', n.trim(), c.trim()), i * 500);
                    }
                });
            } catch (e) {
                addMsg('system', '', `에러 발생: ${e.message}`);
            }
        }

        function addMsg(type, name, text) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = type === 'bot' ? `<span class="bot-name">${name}</span>${text}` : text;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }
    </script>
</body>
</html>
