<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ow</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --chat-bg: #bacee0; --user-bubble: #fee500; --bot-bubble: #ffffff; --system-text: #707b85; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Noto Sans KR', sans-serif; background-color: var(--chat-bg); overflow: hidden; }
        
        /* 입장 모달 */
        #setup-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { text-align: center; width: 90%; max-width: 400px; }
        input[type="password"] { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; text-align: center; font-size: 1rem; }
        .btn-start { width: 100%; padding: 15px; background: #2c3e50; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; }

        /* 메인 채팅창 */
        #main-container { display: none; flex-direction: column; width: 100vw; height: 100vh; }
        .chat-header { background: var(--chat-bg); padding: 15px; font-weight: bold; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; gap: 10px; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px 5%; display: flex; flex-direction: column; gap: 20px; }
        
        /* 메시지 스타일 */
        .message { position: relative; max-width: 80%; padding: 10px 12px; border-radius: 10px; line-height: 1.4; font-size: 0.95rem; word-break: break-all; }
        .message.system { align-self: center; background: rgba(0,0,0,0.1); color: white; font-size: 0.75rem; border-radius: 15px; padding: 5px 12px; margin: 10px 0; }
        .message.user { align-self: flex-end; background: var(--user-bubble); border-top-right-radius: 2px; }
        .message.bot { align-self: flex-start; background: var(--bot-bubble); border-top-left-radius: 2px; margin-top: 15px; }
        .bot-name { position: absolute; top: -18px; left: 2px; font-size: 0.75rem; font-weight: bold; color: #444; }

        /* 하단 입력바 */
        #input-area { background: white; padding: 10px; display: flex; gap: 10px; align-items: center; }
        #user-msg { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 15px; outline: none; font-size: 1rem; }
        .send-btn { background: #fee500; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="setup-modal">
        <div class="modal-content">
            <h2>ow</h2>
            <p style="font-size: 0.85rem; color: #666; margin-bottom: 20px;">
                Google AI Studio에서 <b>New Project</b>로 생성한<br>API 키를 입력해 주세요.
            </p>
            <input type="password" id="api-key" placeholder="API 키를 붙여넣으세요">
            <button class="btn-start" onclick="initChat()">입장하기</button>
        </div>
    </div>

    <div id="main-container">
        <div class="chat-header">
            <span class="material-icons">groups</span>
            <span id="room-name">단톡방</span>
        </div>
        <div id="chat-window"></div>
        <div id="input-area">
            <input type="text" id="user-msg" placeholder="메시지를 입력하세요" onkeypress="if(event.keyCode==13) sendMessage()">
            <button class="send-btn" onclick="sendMessage()">전송</button>
        </div>
    </div>

    <script>
        let chatChars = [];

        function getRandomName() {
            const lNames = ["김","이","박","최","정","강","조","윤"];
            const fNames = ["지호","민서","서준","하윤","도윤","지민","예준","채원"];
            return lNames[Math.floor(Math.random()*lNames.length)] + fNames[Math.floor(Math.random()*fNames.length)];
        }

        function initChat() {
            const rawKey = document.getElementById('api-key').value;
            const keyInput = rawKey.trim(); // 공백 제거

            if(!keyInput) return alert("API 키를 입력해 주세요!");

            // 캐릭터 4명 생성
            chatChars = ["분노", "이성", "막말", "공감"].map(t => ({ name: getRandomName(), trait: t }));
            document.getElementById('room-name').innerText = `${chatChars[0].name} 외 3명`;
            
            document.getElementById('setup-modal').style.display = 'none';
            document.getElementById('main-container').style.display = 'flex';
            
            addMsg('system', '', '오버워치 단톡방에 입장했습니다. 매너 채팅 부탁드립니다!');
        }

        async function sendMessage() {
            const input = document.getElementById('user-msg');
            const apiKey = document.getElementById('api-key').value.trim();
            const text = input.value.trim();

            if(!text || !apiKey) return;

            addMsg('user', '나', text);
            input.value = '';

            // [수정 포인트] 가장 표준적인 v1 주소와 모델명 조합
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

            const prompt = `너는 오버워치 게임 단톡방에 참여 중인 4명의 친구들이야. 
            사용자가 "${text}"라고 말했을 때, 아래 각 캐릭터의 성격에 맞춰 '반말'로 한 줄씩 리액션해줘.
            게임 용어를 적절히 섞어서 리얼하게 대답해줘.

            1. ${chatChars[0].name} (매우 화가 난 상태, 팀원 탓함)
            2. ${chatChars[1].name} (이성적이고 분석적임)
            3. ${chatChars[2].name} (욕은 없지만 거칠고 무례한 말투)
            4. ${chatChars[3].name} (무조건 나를 응원하고 공감해줌)

            출력 형식: "이름: 대사" (각 캐릭터는 줄바꿈으로 구분)`;

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error?.message || '연결에 실패했습니다.');
                }

                const replyText = data.candidates[0].content.parts[0].text;
                
                // 줄바꿈 기준으로 나누어 메시지 표시
                replyText.split('\n').forEach((line, i) => {
                    if(line.includes(':')) {
                        const [name, content] = line.split(':');
                        setTimeout(() => {
                            addMsg('bot', name.trim(), content.trim());
                        }, i * 600);
                    }
                });

            } catch (e) {
                console.error(e);
                addMsg('system', '', `오류 발생: ${e.message}`);
                addMsg('system', '', 'API 키가 새 프로젝트에서 생성된 것인지, 모델명이 Gemini 1.5 Flash인지 다시 확인해 보세요.');
            }
        }

        function addMsg(type, name, text) {
            const win = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            
            if(type === 'bot') {
                div.innerHTML = `<span class="bot-name">${name}</span>${text}`;
            } else {
                div.innerText = text;
            }
            
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }
    </script>
</body>
</html>
